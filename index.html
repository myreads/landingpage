<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Invitation</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

</head>

<body>

<div class="bg"></div>

<div class="sparkles"></div>

<div class="main-container">

<div class="envelope-wrapper">

<div class="envelope" id="envelope">

<div class="envelope-top"></div>

<div class="wax-seal" id="seal">
✦
</div>

<div class="letter">

<div class="invite">

<h3>The Wedding Celebration Of</h3>

<h1>
MEERAB NADEEM
<span>&</span>
MOHSIN AJMAL KHAN
</h1>

<div class="line"></div>

<p class="invite-text">
Together with their families,
request the honour of your presence
at their wedding celebration
</p>

<div class="details">

<p>Friday</p>

<h2>5 JUNE 2026</h2>

<p>8:00 PM</p>

</div>

<div class="venue">

<h4>Venue</h4>

<p>
Pearl Grand Marquee
Karachi, Pakistan
</p>

</div>

<div class="footer-text">
Dinner & Reception To Follow
</div>

</div>

</div>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
