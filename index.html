<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Invitation</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

</head>

<body>

<div class="background"></div>

<div class="envelope-container">

<div class="envelope" id="envelope">

<div class="top-flap"></div>

<div class="letter">

<div class="invite-content">

<h3>Together With Their Families</h3>

<h1>
MEERAB NADEEM
<span>&</span>
MOHSIN AJMAL KHAN
</h1>

<p class="invite-text">
Request the pleasure of your company
at their wedding celebration
</p>

<div class="details">

<p>Friday, 5 June 2026</p>

<p>8:00 PM</p>

<p>Reception & Dinner To Follow</p>

<p>Formal Attire</p>

</div>

<div class="venue">

<h2>Wedding Venue</h2>

<p>
Pearl Grand Marquee
Karachi, Pakistan
</p>

</div>

</div>

</div>

<div class="wax-seal" id="seal">
OPEN
</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
